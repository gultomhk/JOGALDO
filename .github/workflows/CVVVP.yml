name: Cvvp Auto Fetch

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'  # Setiap 1 jam

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install requests urllib3

      - name: 📁 Ambil file konfigurasi dari repo privat
        run: |
          git clone --depth=1 https://x-access-token:${{ secrets.TOKEN_PRIVATE }}@github.com/${{ secrets.REPO_PRIVATE }} configrepo
          cp configrepo/cvvpdata_file.txt $HOME/cvvpdata_file.txt

      - name: ▶️ Generate M3U
        run: |
          python CHINVVP.py

      - name: 📤 Push output ke repo privat jika ada perubahan
        shell: bash
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git clone --depth=1 https://x-access-token:${{ secrets.TOKEN_PRIVATE }}@github.com/${{ secrets.REPO_PRIVATE }} repo-output
          cp ZIGZAGO.m3u repo-output/

          cd repo-output
          git add ZIGZAGO.m3u

          if git diff --cached --quiet; then
            echo "✅ Tidak ada perubahan pada ZIGZAGO.m3u, skip push."
          else
            git commit -m "🔄 auto: update ZIGZAGO.m3u"
            git push
          fi
